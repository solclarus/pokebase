name: Validate

on:
  pull_request:
    paths:
      - "data/**"
      - "packages/scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Validate data
        run: pnpm run --filter @pokemon/scripts validate

      - name: Build index
        run: pnpm run --filter @pokemon/scripts build:index

      - name: Check for uncommitted changes
        run: |
          if [[ -n $(git status --porcelain data/_index/) ]]; then
            echo "Index files are out of date. Please run 'pnpm run --filter @pokemon/scripts build:index' and commit the changes."
            git diff data/_index/
            exit 1
          fi
