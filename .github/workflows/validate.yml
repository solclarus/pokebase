name: Validate

on:
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate data
        run: npm run validate

      - name: Build index
        run: npm run build:index

      - name: Check for uncommitted changes
        run: |
          if [[ -n $(git status --porcelain data/_index/) ]]; then
            echo "Index files are out of date. Please run 'npm run build:index' and commit the changes."
            git diff data/_index/
            exit 1
          fi
